<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="液冷充电桩">
  <defs>
    <linearGradient id="acp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1211"/><stop offset="0.55" stop-color="#13201a"/><stop offset="1" stop-color="#1b2c22"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#acp)"/>
  <circle cx="400" cy="260" r="195" fill="#ffffff" opacity="0.06"/>
  <!-- charger body -->
  <rect x="300" y="140" width="150" height="260" rx="22" fill="#eaf6ff"/>
  <rect x="324" y="170" width="102" height="78" rx="10" fill="#16324f"/>
