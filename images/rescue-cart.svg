<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="运维应急小车">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1211"/>
      <stop offset="0.55" stop-color="#13201a"/>
      <stop offset="1" stop-color="#1b2c22"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg4)"/>
  <g fill="#ffffff" opacity="0.05">
    <circle cx="120" cy="110" r="3"/><circle cx="160" cy="110" r="3"/><circle cx="200" cy="110" r="3"/>
    <circle cx="600" cy="420" r="3"/><circle cx="640" cy="420" r="3"/><circle cx="680" cy="420" r="3"/>
  </g>
  <circle cx="400" cy="260" r="190" fill="#ffffff" opacity="0.06"/>
  <!-- handle -->
  <path d="M250 150 h40 v18 h-22 v210 h-18 z" fill="#9fb6c6"/>
  <!-- cart body -->
  <rect x="290" y="170" width="240" height="190" rx="16" fill="#eaf6ff"/>
  <rect x="290" y="170" width="240" height="190" rx="16" fill="none" stroke="#c6f24e" stroke-width="4" opacity="0.6"/>
  <!-- drawers -->
  <line x1="290" y1="232" x2="530" y2="232" stroke="#16324f" stroke-width="5"/>
  <line x1="290" y1="296" x2="530" y2="296" stroke="#16324f" stroke-width="5"/>
  <rect x="392" y="198" width="36" height="10" rx="5" fill="#9fb6c6"/>
  <rect x="392" y="258" width="36" height="10" rx="5" fill="#9fb6c6"/>
  <!-- emergency cross -->
  <g transform="translate(410,322)">
    <rect x="-9" y="-22" width="18" height="44" rx="4" fill="#c6f24e"/>
    <rect x="-22" y="-9" width="44" height="18" rx="4" fill="#c6f24e"/>
  </g>
  <!-- platform -->
  <rect x="276" y="362" width="268" height="16" rx="8" fill="#bcd6e6"/>
  <!-- wheels -->
  <circle cx="330" cy="400" r="24" fill="#16324f"/><circle cx="330" cy="400" r="9" fill="#5ec6e8"/>
  <circle cx="490" cy="400" r="24" fill="#16324f"/><circle cx="490" cy="400" r="9" fill="#5ec6e8"/>
</svg>
