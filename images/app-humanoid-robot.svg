  <!-- torso -->
  <rect x="318" y="262" width="164" height="150" rx="22" fill="#eaf6ff"/>
  <circle cx="400" cy="320" r="20" fill="#c6f24e"/>
  <rect x="360" y="356" width="80" height="10" rx="5" fill="#9fb6c6"/>
  <!-- arms -->
  <rect x="270" y="270" width="34" height="130" rx="17" fill="#eaf6ff"/>
  <rect x="496" y="270" width="34" height="130" rx="17" fill="#eaf6ff"/>
  <!-- legs -->
