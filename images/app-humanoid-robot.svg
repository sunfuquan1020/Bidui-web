<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="人形机器人">
  <defs>
    <linearGradient id="arb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1211"/><stop offset="0.55" stop-color="#13201a"/><stop offset="1" stop-color="#1b2c22"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#arb)"/>
  <circle cx="400" cy="260" r="195" fill="#ffffff" opacity="0.06"/>
  <!-- antenna -->
  <line x1="400" y1="118" x2="400" y2="150" stroke="#5ec6e8" stroke-width="8" stroke-linecap="round"/>
  <circle cx="400" cy="110" r="9" fill="#c6f24e"/>
  <!-- head -->
  <rect x="338" y="150" width="124" height="92" rx="22" fill="#eaf6ff"/>
  <circle cx="372" cy="196" r="12" fill="#16324f"/><circle cx="428" cy="196" r="12" fill="#16324f"/>
  <circle cx="372" cy="196" r="4" fill="#5ec6e8"/><circle cx="428" cy="196" r="4" fill="#5ec6e8"/>
