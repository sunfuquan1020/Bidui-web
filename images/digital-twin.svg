<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="数字孪生与 AI 预测平台">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1211"/>
      <stop offset="0.55" stop-color="#13201a"/>
      <stop offset="1" stop-color="#1b2c22"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" fill="url(#bg3)"/>
  <!-- neural nodes -->
  <g opacity="0.5" stroke="#5ec6e8" stroke-width="3">
    <line x1="150" y1="120" x2="250" y2="170"/><line x1="150" y1="120" x2="250" y2="260"/>
    <line x1="150" y1="220" x2="250" y2="170"/><line x1="150" y1="220" x2="250" y2="260"/>
    <line x1="650" y1="120" x2="560" y2="180"/><line x1="650" y1="240" x2="560" y2="180"/>
  </g>
  <g fill="#5ec6e8">
    <circle cx="150" cy="120" r="9"/><circle cx="150" cy="220" r="9"/><circle cx="250" cy="170" r="9"/><circle cx="250" cy="260" r="9"/>
    <circle cx="650" cy="120" r="9"/><circle cx="650" cy="240" r="9"/><circle cx="560" cy="180" r="9"/>
  </g>
  <circle cx="400" cy="270" r="180" fill="#ffffff" opacity="0.06"/>
  <!-- dashboard panel -->
  <rect x="250" y="160" width="300" height="220" rx="18" fill="#eaf6ff"/>
  <rect x="250" y="160" width="300" height="220" rx="18" fill="none" stroke="#c6f24e" stroke-width="4" opacity="0.6"/>
  <rect x="250" y="160" width="300" height="40" rx="18" fill="#16324f"/>
  <circle cx="278" cy="180" r="6" fill="#c6f24e"/><circle cx="300" cy="180" r="6" fill="#5ec6e8"/><circle cx="322" cy="180" r="6" fill="#9fb6c6"/>
  <!-- bars -->
  <g fill="#bcd6e6">
    <rect x="280" y="300" width="26" height="50" rx="4"/>
    <rect x="320" y="280" width="26" height="70" rx="4"/>
    <rect x="360" y="296" width="26" height="54" rx="4"/>
  </g>
  <!-- prediction line -->
  <polyline points="280,330 320,300 360,312 410,260 460,236 510,210" fill="none" stroke="#c6f24e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="510" cy="210" r="8" fill="#c6f24e"/>
  <!-- forecast dashed -->
  <polyline points="510,210 540,196" fill="none" stroke="#c6f24e" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 12"/>
</svg>
